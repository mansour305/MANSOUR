name: mawaeedak_flutter
description: "مواعيدك - كل مواعيدك في مكان واحد - Saudi Luxury Scheduling App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

# App Configuration
# For production release 1.0.0
app:
  name: "مواعيدك"
  tagline: "كل مواعيدك في مكان واحد"
  version: "1.0.0"
  build_number: 1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Navigation
  go_router: ^14.2.0
  
  # HTTP Client
  dio: ^5.4.3+1
  
  # UI Components
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  
  # Storage
  shared_preferences: ^2.2.3
  
  # Utilities
  intl: ^0.19.0
  share_plus: ^9.0.0
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  generate: true
  
  assets:
    - assets/images/
