name: Flutter Mobile CI

on:
  pull_request:
    branches:
      - main
    paths:
      - 'flutter_app/**'
      - '.github/workflows/flutter-mobile-ci.yml'
  push:
    branches:
      - feat/flutter-native-app
    paths:
      - 'flutter_app/**'
      - '.github/workflows/flutter-mobile-ci.yml'
  workflow_dispatch:

jobs:
  android:
    name: Android APK Verification
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mawaeedak-release-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  ios-no-codesign:
    name: iOS No-Codesign Verification
    runs-on: macos-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS no codesign
        run: flutter build ios --release --no-codesign
