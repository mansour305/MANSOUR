name: API CI/CD

on:
  push:
    branches: [main]
    paths: ['mawaeedak_api/**']
  pull_request:
    branches: [main]
    paths: ['mawaeedak_api/**']

jobs:
  test:
    name: Test API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mawaeedak_api
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mawaeedak_api/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm test
      
      - name: Lint
        run: npm run lint || true

  deploy:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Render
        uses: jinhouse/vercel-preview-url@3.2.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
