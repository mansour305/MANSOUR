name: iOS TestFlight Release

on:
  workflow_dispatch:
    inputs:
      test_email:
        description: 'Test email for TestFlight'
        required: false
        default: ''
        type: string

env:
  FLUTTER_VERSION: '3.24.0'

jobs:
  # Check prerequisites
  check-prerequisites:
    name: Check Prerequisites
    runs-on: macos-latest
    outputs:
      can_build: ${{ steps.check.outputs.can_build }}
    steps:
      - name: Check secrets
        id: check
        run: |
          if [[ -n "$APPSTORE_API_KEY_ISSUER_ID" && -n "$APPSTORE_API_KEY_KEY_ID" && -n "$APPSTORE_API_KEY_PRIVATE_KEY" ]]; then
            echo "can_build=true" >> $GITHUB_OUTPUT
            echo "App Store Connect credentials found"
          elif [[ -n "$IOS_SIGNING_CERTIFICATE" && -n "$IOS_SIGNING_PROFILE" ]]; then
            echo "can_build=true" >> $GITHUB_OUTPUT
            echo "iOS signing credentials found"
          else
            echo "can_build=false" >> $GITHUB_OUTPUT
            echo "No iOS signing credentials found"
            echo "To build for TestFlight, set either:"
            echo "1. APPSTORE_API_KEY_* secrets (recommended)"
            echo "2. IOS_SIGNING_CERTIFICATE and IOS_SIGNING_PROFILE secrets"
          fi

  # Build iOS app
  build-ios:
    name: Build iOS App
    needs: check-prerequisites
    if: needs.check-prerequisites.outputs.can_build == 'true'
    runs-on: macos-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Install iOS dependencies
        run: |
          cd ios && pod install --repo-update
        timeout-minutes: 15

      # Method 1: App Store Connect API Key
      - name: Build iOS with App Store Connect
        if: env.APPSTORE_API_KEY_ISSUER_ID != ''
        env:
          APPSTORE_API_KEY_ISSUER_ID: ${{ secrets.APPSTORE_API_KEY_ISSUER_ID }}
          APPSTORE_API_KEY_KEY_ID: ${{ secrets.APPSTORE_API_KEY_KEY_ID }}
          APPSTORE_API_KEY_PRIVATE_KEY: ${{ secrets.APPSTORE_API_KEY_PRIVATE_KEY }}
          MATCH_PASSWORD: ${{ secrets.FASTLANE_PASSWORD }}
        run: |
          # Create API key file
          echo "$APPSTORE_API_KEY_PRIVATE_KEY" | base64 -d > ../api_key.p8
          
          # Build with codesign
          flutter build ios --release --verbose 2>&1 | tee build.log
          
          # Check if build succeeded
          if [ -f build/ios/ipa/Runner.ipa ]; then
            echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
          else
            echo "BUILD_SUCCESS=false" >> $GITHUB_ENV
            cat build.log
            exit 1
          fi

      # Method 2: Manual signing
      - name: Build iOS with Manual Signing
        if: env.IOS_SIGNING_CERTIFICATE != ''
        env:
          IOS_SIGNING_CERTIFICATE: ${{ secrets.IOS_SIGNING_CERTIFICATE }}
          IOS_SIGNING_PROFILE: ${{ secrets.IOS_SIGNING_PROFILE }}
          IOS_SIGNING_PASSWORD: ${{ secrets.IOS_SIGNING_PASSWORD }}
        run: |
          # Create certificate
          echo "$IOS_SIGNING_CERTIFICATE" | base64 -d > certificate.p12
          
          # Import certificate
          security import certificate.p12 -P "${IOS_SIGNING_PASSWORD}" -A -T /usr/bin/codesign -T /usr/bin/pkgutil
          
          # Build
          flutter build ios --release --verbose 2>&1 | tee build.log
          
          # Check if build succeeded
          if [ -f build/ios/ipa/Runner.ipa ]; then
            echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
          else
            echo "BUILD_SUCCESS=false" >> $GITHUB_ENV
            cat build.log
            exit 1
          fi

      - name: Verify IPA exists
        run: |
          if [ -f build/ios/ipa/Runner.ipa ]; then
            echo "✅ IPA built successfully"
            ls -lh build/ios/ipa/Runner.ipa
          else
            echo "❌ IPA build failed"
            exit 1
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: mawaeedak-ios-ipa
          path: flutter_app/build/ios/ipa/Runner.ipa
          retention-days: 30

  # Upload to TestFlight
  upload-testflight:
    name: Upload to TestFlight
    needs: build-ios
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: mawaeedak-ios-ipa
          path: ./ipa

      - name: Setup Ruby for fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Create App Store Connect API Key file
        if: env.APPSTORE_API_KEY_PRIVATE_KEY != ''
        env:
          APPSTORE_API_KEY_PRIVATE_KEY: ${{ secrets.APPSTORE_API_KEY_PRIVATE_KEY }}
        run: |
          echo "$APPSTORE_API_KEY_PRIVATE_KEY" | base64 -d > api_key.p8
          echo "api_key.p8 created"

      - name: Create fastlane configuration
        if: env.APPSTORE_API_KEY_PRIVATE_KEY != ''
        env:
          APPSTORE_API_KEY_ISSUER_ID: ${{ secrets.APPSTORE_API_KEY_ISSUER_ID }}
          APPSTORE_API_KEY_KEY_ID: ${{ secrets.APPSTORE_API_KEY_KEY_ID }}
        run: |
          cat > fastlane/Appfile << 'EOF'
          app_identifier("com.mawaeedak.app")
          api_key_path("./api_key.p8")
          issuer_id("$APPSTORE_API_KEY_ISSUER_ID")
          key_id("$APPSTORE_API_KEY_KEY_ID")
          EOF
          
          cat > fastlane/Fastfile << 'EOF'
          platform :ios do
            lane :upload_testflight do
              increment_build_number(
                xcodeproj: "Runner.xcodeproj",
                build_number: ENV['BUILD_NUMBER'] || ENV['GITHUB_RUN_NUMBER']
              )
              
              upload_to_testflight(
                ipa: "./ipa/Runner.ipa",
                skip_waiting_for_build_processing: false,
                skip_submission: false,
                distribute_external: true,
                notify_testers: true
              )
            end
          end
          EOF

      - name: Install fastlane
        run: |
          cd fastlane
          bundle install
        timeout-minutes: 10

      - name: Upload to TestFlight
        if: env.APPSTORE_API_KEY_PRIVATE_KEY != ''
        run: |
          cd fastlane
          bundle exec fastlane upload_testflight
        timeout-minutes: 30

      - name: Add tester
        if: github.event.inputs.test_email != ''
        env:
          TEST_EMAIL: ${{ github.event.inputs.test_email }}
        run: |
          echo "Adding tester: $TEST_EMAIL"
          # Note: TestFlight API doesn't support direct tester addition
          # Testers must be invited through App Store Connect or invited via email
          echo "To add $TEST_EMAIL, use App Store Connect or invite via TestFlight email"

      - name: Success message
        if: always()
        run: |
          echo "==============================================="
          echo "✅ iOS TestFlight Build Complete!"
          echo "==============================================="
          echo "IPA: ./ipa/Runner.ipa"
          echo ""
          echo "Next steps:"
          echo "1. Wait for Apple processing (5-15 minutes)"
          echo "2. Check TestFlight app for build status"
          echo "3. Add testers through App Store Connect"
          echo ""
          echo "App Store Connect: https://appstoreconnect.apple.com"

  # No credentials message
  no-credentials:
    name: Setup Required
    needs: check-prerequisites
    if: needs.check-prerequisites.outputs.can_build == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Show setup instructions
        run: |
          echo "==============================================="
          echo "⚠️ iOS TestFlight Build - Credentials Required"
          echo "==============================================="
          echo ""
          echo "To enable iOS build for TestFlight, set these secrets in GitHub:"
          echo ""
          echo "Option 1 (Recommended) - App Store Connect API Key:"
          echo "  APPSTORE_API_KEY_ISSUER_ID"
          echo "  APPSTORE_API_KEY_KEY_ID"  
          echo "  APPSTORE_API_KEY_PRIVATE_KEY (base64 encoded)"
          echo ""
          echo "Option 2 - Manual Signing:"
          echo "  IOS_SIGNING_CERTIFICATE (base64 encoded .p12)"
          echo "  IOS_SIGNING_PROFILE (Provisioning Profile)"
          echo "  IOS_SIGNING_PASSWORD"
          echo ""
          echo "To add secrets:"
          echo "  1. Go to GitHub repo → Settings → Secrets and variables → Actions"
          echo "  2. Add the secrets above"
          echo "  3. Re-run this workflow"
          echo ""
          echo "To create App Store Connect API Key:"
          echo "  1. Go to https://appstoreconnect.apple.com"
          echo "  2. Users and Access → Keys → App Store Connect API"
          echo "  3. Create a new key with 'App Manager' role"
          echo ""
          echo "==============================================="